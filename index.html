<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Conductor</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: #0d1117; }
      #splash {
        position: fixed; inset: 0;
        background: #0d1117;
        display: flex; align-items: center; justify-content: center;
        z-index: 9999;
        -webkit-app-region: drag;
      }
      #splash-inner {
        display: flex; flex-direction: column; align-items: center; gap: 12px;
        animation: sp-pop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
      }
      #splash-inner svg { width: 72px; height: 72px; border-radius: 16px; display: block; }
      #splash-name {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 18px; font-weight: 600; color: #f0f6fc; letter-spacing: 0.02em;
        animation: sp-fade 0.4s 0.1s ease both;
      }
      #splash-ver {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 11px; color: #484f58; letter-spacing: 0.05em;
        animation: sp-fade 0.4s 0.15s ease both;
      }
      #splash-track {
        width: 120px; height: 2px; background: #21262d; border-radius: 2px;
        overflow: hidden; margin-top: 8px;
        animation: sp-fade 0.4s 0.2s ease both;
      }
      #splash-bar {
        height: 100%; width: 40%;
        background: linear-gradient(90deg, #3fb950, #58a6ff, #bc8cff);
        border-radius: 2px;
        animation: sp-slide 1.2s 0.3s ease-in-out infinite;
      }
      @keyframes sp-pop {
        from { opacity: 0; transform: scale(0.85); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes sp-fade {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes sp-slide {
        0%   { transform: translateX(-150%); }
        100% { transform: translateX(350%); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-inner">
        <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="baton" x1="0%" y1="100%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#3fb950"/>
              <stop offset="40%" style="stop-color:#58a6ff"/>
              <stop offset="100%" style="stop-color:#bc8cff"/>
            </linearGradient>
          </defs>
          <rect width="128" height="128" rx="28" fill="#0d1117"/>
          <rect x="18" y="42" width="44" height="30" rx="5" fill="none" stroke="#9b59b6" stroke-width="1.8" opacity="0.4"/>
          <circle cx="25" cy="49" r="2" fill="#9b59b6" opacity="0.6"/>
          <rect x="26" y="50" width="44" height="30" rx="5" fill="none" stroke="#3fb950" stroke-width="1.8" opacity="0.55"/>
          <circle cx="33" cy="57" r="2" fill="#3fb950" opacity="0.7"/>
          <rect x="34" y="58" width="44" height="30" rx="5" fill="none" stroke="#58a6ff" stroke-width="2.2"/>
          <circle cx="41" cy="65" r="2.5" fill="#58a6ff"/>
          <path d="M48 100 Q70 54 98 20" fill="none" stroke="url(#baton)" stroke-width="0.8" stroke-linecap="round" opacity="0.06"/>
          <path d="M50 99 Q72 52 100 21" fill="none" stroke="url(#baton)" stroke-width="1.2" stroke-linecap="round" opacity="0.08"/>
          <path d="M52 98 Q74 51 102 22" fill="none" stroke="url(#baton)" stroke-width="1.8" stroke-linecap="round" opacity="0.12"/>
          <path d="M54 97 Q76 50 104 23" fill="none" stroke="url(#baton)" stroke-width="2.5" stroke-linecap="round" opacity="0.18"/>
          <path d="M56 96 Q78 48 106 24" fill="none" stroke="url(#baton)" stroke-width="4" stroke-linecap="round"/>
          <path d="M58 97 Q80 50 108 25" fill="none" stroke="url(#baton)" stroke-width="2.5" stroke-linecap="round" opacity="0.15"/>
          <path d="M60 98 Q82 52 110 26" fill="none" stroke="url(#baton)" stroke-width="1.8" stroke-linecap="round" opacity="0.08"/>
          <path d="M62 99 Q84 54 112 27" fill="none" stroke="url(#baton)" stroke-width="1" stroke-linecap="round" opacity="0.04"/>
          <circle cx="106" cy="24" r="6" fill="#bc8cff"/>
          <circle cx="106" cy="24" r="12" fill="#bc8cff" opacity="0.1"/>
        </svg>
        <div id="splash-name">Agent Conductor</div>
        <div id="splash-ver">v2.5.0</div>
        <div id="splash-track"><div id="splash-bar"></div></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
